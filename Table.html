<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and nested tables</title>
</head>
<body bgcolor="808080">
    table example
    <table border="1" bordercolor="red">
        <tr>
            <th>S.N</th>
            <th>Student Name</th>
            <th>Address</th> 
        </tr>
        <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>Anytown, USA</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Jane Smith</td>
            <td>Sometown, USA</td>
        </tr>
    </table>
    <hr>
    <h2>Nested table example</h2>
    <table border="1" bordercolor="red">
        <tr>
            <td>Table 1</td>
            <td>Table 1
                <table border="1" bordercolor="green">
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                </table>

            </td>
        </tr>
        <tr>
            <td>Table 1</td>
            <td>Table 1</td>
        </tr>
    </table>
    <hr>
    <h2>Table with colspan and rowspan</h2>
    <table border="1" bordercolor="red">
        <tr>
            <th colspan="2">Class Routine</th>
        </tr>
        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr>
        <tr>
            <td>Sunday</td>
            <td>Statistics</td>
        </tr>
        <tr >
            <td>Monday</td>
            <td rowspan="2">Microprocessor</td>
        </tr>
        <tr>
            <td>Tuesday</td>
        </tr>
        

    </table>
</body>
</html>
