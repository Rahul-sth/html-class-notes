<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML forms</title>
</head>
<body>
    <form>
        <label >Name:</label>
        <input type ="text"><hr>
        <label >Number:</label>
        <input type ="number"><hr>
        <label >Password:</label>
        <input type ="password"><hr>
        <label >Email:</label>
        <input type ="email"><hr>
        <label >Date:</label>
        <input type ="date"><hr>
        <label> File:</label>
        <input type ="file"><hr>
        <label>Time:</label>
        <input type ="time"><hr>

        <!--1st method-->
        <input type="submit"><input type="reset"><hr>
        
        <!--2nd method-->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        <br><hr>
        <h2>Check box</h2>
        <h4>Hobbies:</h4>
        <input type="checkbox" ><label>Reading📚</label><br>
        <input type="checkbox" ><label>Traveling🚵</label><br>    
        <input type="checkbox" ><label>Cooking🍳</label><br>
        <input type="checkbox" ><label>Sports⚽</label><br>
        <input type="checkbox" ><label>Music🎵</label><br>
        <input type="checkbox" ><label>Coding⌨️</label><br>
        <hr>
        <h2>Radio button</h2>
        <h4>Gender:</h4>
        <input type="radio" name="gender" ><label>Male</label><br>
        <input type="radio" name="gender" ><label>Female</label><br>
        <input type="radio" name="gender" ><label>Other</label><br> 

    </form>
</body>
</html>
