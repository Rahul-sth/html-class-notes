<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    Order Lists:
    <ol type="A"> 
        <li>BSc.CSIT</li>
        <li>BITM    </li>
        <li>BCA     </li>
    </ol>
    unorder Lists:
    <ul type="square">
        <li>BSc.CSIT</li>
        <li>BITM    </li>
        <li>BCA     </li>
    </ul>

    Nested Order Lists:
    <h2>Cafe Menu</h2>
    <ol>
        <li>Hot Drinks
            <ol type="a">
                <li>Milk Drinks</li>
                <li>Americano</li>
            </ol>
        </li>
        <li>Cold Drinks
            <ul type="disc">
                <li>Ice Latte</li>
                <li> Milkshake</li>
            </ul>
        </li>
    </ol>
</body>
</html>
